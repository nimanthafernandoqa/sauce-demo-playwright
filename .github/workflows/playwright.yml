name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  # ─── Main test job ────────────────────────────────────────────────────────────
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # Run tests in shards for speed (splits the test suite across runners)
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true

      - name: Upload test results (blob)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 3

  # ─── Merge shards and publish HTML report ─────────────────────────────────────
  report:
    name: Merge Reports & Publish
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: playwright-blob-*
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit results (for test dashboard)
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/results.xml
          retention-days: 14

  # ─── AI Self-Healing job (runs only when tests fail) ─────────────────────────
  ai-heal:
    name: AI Self-Healing Agent
    needs: test
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: playwright-blob-*
          merge-multiple: true

      - name: Run AI Self-Healing Agent
        run: npx ts-node agents/self-healer.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true

      - name: Create Pull Request with healed tests
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix(tests): AI self-healed broken selectors'
          title: '🤖 AI Self-Healed Test Fixes'
          body: |
            This PR was automatically created by the AI self-healing agent.

            The agent detected failing selectors and proposed updated locators
            using Claude AI. Please review the changes before merging.
          branch: ai/self-heal-${{ github.run_number }}
          base: ${{ github.head_ref || github.ref_name }}
